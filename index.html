<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Cipher | Online Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .history-scroll::-webkit-scrollbar { width: 4px; }
        .history-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-[370px] h-[780px] bg-[#0A0E14] rounded-[3rem] border-[8px] border-slate-900 shadow-2xl flex flex-col overflow-hidden relative">
        
        <div id="lobby-screen" class="flex-1 flex flex-col justify-center px-8 space-y-6">
            <div class="text-center space-y-2">
                <h1 class="text-3xl font-black tracking-tighter">SECRET CIPHER</h1>
                <p class="text-slate-500 text-xs uppercase tracking-widest">Online Multiplayer</p>
            </div>

            <div class="space-y-4 pt-6">
                <input id="user-name" type="text" placeholder="Your Name" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <input id="user-secret" type="number" placeholder="Set Your Secret Number" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                
                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-800"></span></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0A0E14] px-2 text-slate-600">Join a Friend</span></div>
                </div>

                <input id="join-id" type="text" placeholder="Enter Friend's ID" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl focus:ring-2 focus:ring-purple-500 outline-none">
            </div>

            <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20 active:scale-95 transition-all">
                START BATTLE
            </div>
            
            <div id="my-id-container" class="text-center p-3 glass rounded-xl">
