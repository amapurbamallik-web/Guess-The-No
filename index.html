<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Cipher Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; overflow: hidden; }
        .history-container::-webkit-scrollbar { width: 4px; }
        .history-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .p1-bubble { background: linear-gradient(135deg, #1e40af, #1d4ed8); border-radius: 20px 20px 20px 4px; }
        .p2-bubble { background: linear-gradient(135deg, #7e22ce, #9333ea); border-radius: 20px 20px 4px 20px; }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">

    <div class="relative w-full max-w-[360px] h-[740px] bg-[#0A0E14] rounded-[3rem] border-[10px] border-[#1e293b] shadow-2xl flex flex-col overflow-hidden">
        
        <header class="px-6 py-8 border-b border-white/5 bg-[#0A0E14]/80 backdrop-blur-md mt-4">
            <h1 class="text-xl font-black tracking-tighter">SECRET CIPHER <span class="text-green-500 text-[10px] ml-2">● LIVE</span></h1>
            <div id="status" class="text-[10px] font-bold text-blue-400 mt-1 uppercase tracking-widest">Connecting to Server...</div>
        </header>

        <div id="history" class="history-container flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
            </div>

        <div id="setup-screen" class="absolute inset-0 bg-[#0A0E14] z-50 flex flex-col items-center justify-center p-8 text-center">
            <h2 class="text-2xl font-bold mb-4">Join Game</h2>
            <input id="room-id" type="text" placeholder="Enter Room Name" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4 outline-none focus:border-blue-500">
            <input id="my-secret" type="number" placeholder="Your Secret Number" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-6 outline-none focus:border-blue-500">
            <button onclick="joinGame()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500 transition-all">START BATTLE</button>
        </div>

        <div class="p-6 bg-[#111827] border-t border-white/10">
            <form id="guess-form" class="flex gap-2">
                <input id="guess-input" type="number" placeholder="Guess..." class="flex-1 bg-black border border-white/10 rounded-2xl px-4 py-3 text-white outline-none focus:border-blue-500 text-sm">
                <button type="submit" class="bg-blue-600 px-6 py-3 rounded-2xl font-bold shadow-lg">GO</button>
            </form>
        </div>

        <div class="h-1.5 w-32 bg-white/10 rounded-full mx-auto mb-2 shrink-0"></div>
    </div>

        // 1. REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomName = "";
        let playerNum = 0; // 1 or 2
        let mySecret = 0;
        let opponentSecret = null;
        let currentTurn = 1;
