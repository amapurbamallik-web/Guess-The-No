        :root {
            --p1-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --p2-gradient: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);

            --border-slate: #1e293b;

        body {

            background-color: var(--bg-dark);
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-container {
            background: var(--card-dark);
            border: 8px solid var(--border-slate);

            position: relative;
            overflow: hidden;
        }

        .tab-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #64748b;
        }

        .tab-btn.active {
            background: #1e293b;
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid var(--border-slate) !important;
            border-radius: 1rem;
            color: white;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #3b82f6 !important;
            outline: none;
        }

        #history {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

            position: relative;
            max-width: 85%;
            padding: 1rem;

            transition: all 0.3s ease;
        }

        }
