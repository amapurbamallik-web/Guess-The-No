<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Guess Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 Multiplayer Guess Game</h1>

<div id="setup">
    <input type="number" id="players" placeholder="Number of Players">
    <input type="number" id="secret" placeholder="Enter Secret Number">
    <button onclick="startGame()">Start Game</button>
</div>

<div id="game" style="display:none;">
    <h2 id="turn"></h2>
    <input type="number" id="guess" placeholder="Enter your guess">
    <button onclick="checkGuess()">Submit Guess</button>
    <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
