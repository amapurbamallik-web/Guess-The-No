<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuessTheNo - Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-[380px] h-[750px] bg-[#0A0E14] rounded-[3rem] border-[8px] border-slate-900 flex flex-col overflow-hidden relative shadow-2xl">
        
        <div id="setup-screen" class="flex-1 flex flex-col justify-center px-8 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-black italic tracking-tighter text-blue-500">GUESS THE NO.</h2>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Multiplayer Battle</p>
            </div>
            
            <div class="space-y-3">
                <input id="user-name" type="text" placeholder="Your Nickname" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all">
                <input id="user-secret" type="number" placeholder="Set Your Secret (1-100)" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="host-mode-btn" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs uppercase transition-all">Host Game</button>
                <button id="join-mode-btn" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs uppercase transition-all">Join Game</button>
            </div>

            <div id="host-section" class="hidden space-y-4 pt-4 border-t border-white/5">
                <div class="bg-black p-4 rounded-2xl border border-dashed border-slate-700">
                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Your Room ID</p>
                    <div id="my-id-display" class="text-blue-400 font-mono font-bold break-all">Generating...</div>
                </div>
                <p class="text-[10px] text-center text-slate-500 italic">Waiting for opponent to connect...</p>
            </div>

            <div id="join-section" class="hidden space-y-4 pt-4 border-t border-white/5">
                <input id="room-id-input" type="text" placeholder="Paste Room ID here" class="w-full bg-blue-900/20 border border-blue-500/30 p-4 rounded-2xl focus:outline-none focus:border-blue-500 text-blue-400 font-mono">
                <button id="start-join-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black transition-all shadow-lg active:scale-95">JOIN BATTLE</button>
            </div>
        </div>

        <div id="game-screen" class="hidden flex-1 flex flex-col">
            <header class="p-6 border-b border-white/5 bg-slate-900/50">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Opponent</p>
                        <p id="opp-name-display" class="font-bold text-blue-400 italic">Connecting...</p>
                    </div>
                    <div id="turn-badge" class="bg-slate-800 text-slate-500 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter transition-colors">Waiting</div>
                </div>
            </header>

            <div id="history" class="flex-1 overflow-y-auto p-4 space-y-3">
                </div>

            <footer class="p-6 bg-slate-950 border-t border-white/5">
                <form id="guess-form" class="flex gap
